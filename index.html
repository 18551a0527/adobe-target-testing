<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Target Commerce</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">Target Commerce</div>

    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>

  <section class="hero">
    <h1 id="hero-title">Summer Sale 50% OFF</h1>

    <p id="hero-subtitle">
      Practice Adobe Target personalization and A/B testing.
    </p>

    <button class="primary-btn">
      Shop Now
    </button>
  </section>

  <section class="features">

    <div class="card">
      <h2>Free Shipping</h2>
      <p>Orders above ₹999</p>
    </div>

    <div class="card">
      <h2>Fast Delivery</h2>
      <p>Get products in 2 days</p>
    </div>

    <div class="card">
      <h2>Exclusive Deals</h2>
      <p>Special discounts for members</p>
    </div>

  </section>

  <section class="products-preview">

    <h2>Featured Products</h2>

    <div class="product-grid">

      <div class="product-card">
        <img src="https://picsum.photos/300/200?1" alt="Product" />
        <h3>Running Shoes</h3>
        <p>₹2,999</p>
        <button>Add to Cart</button>
      </div>

</html>
